<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github: Gilson Garcia Junior</title>
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <img id="avatar" class="profile-avatar" src="https://placehold.co/180x180" alt="Avatar">
            <h1 id="name" class="profile-name">x</h1>
            <h2 id="username" class="profile-username">x</h2>
            <ul class="numbers">
                <li class="numbers-item">
                    <h4>Repositórios</h4><span id="repos">0</span>
                </li>
                <li class="numbers-item">
                    <h4>Seguidores</h4><span id="followers">0</span>
                </li>
                <li class="numbers-item">
                    <h4>Seguindo</h4><span id="following">0</span>
                </li>
            </ul>
            <a id="link" href="" class="profile-link" target="_blank">Ver no Github</a>
        </div>
    </header>
    <script src="main.js"></script>
</body>
</html>
